server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # API 요청을 백엔드(api 서비스)로 프록시
    location /api {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 대용량 응답(엑셀 다운로드 등) 대비 타임아웃 상향 (30분)
        proxy_connect_timeout 120s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;

        # 다운로드 응답을 버퍼링하지 않도록(메모리/지연 완화)
        proxy_buffering off;
    }

    # Swagger/OpenAPI (springdoc) - 백엔드로 프록시
    location /swagger-ui/ {
        proxy_pass http://api:8080/swagger-ui/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /swagger-ui.html {
        proxy_pass http://api:8080/swagger-ui.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs/ {
        proxy_pass http://api:8080/v3/api-docs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /v3/api-docs {
        proxy_pass http://api:8080/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy page endpoints (removed in backend) should return 404
    location ~ ^/page[1-6]$ {
        return 404;
    }

    # favicon: 있으면 서비스, 없으면 204로 403 방지
    location = /favicon.ico {
        try_files $uri =204;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|otf)$ {
        try_files $uri =404;
        expires 1d;
        access_log off;
        add_header Cache-Control "public";
    }

    error_page 404 /index.html;
}

