services:
    api:
        build:
            context: ./backend
        ports:
            - '8080:8080'
        restart: always
        volumes:
            - ./config/top-service-account.json:/app/config/top-service-account.json
            # 서버의 application.properties를 컨테이너에 마운트 (RDS 정보 등)
            - ./backend/src/main/resources/application.properties:/app/config/application.properties
        environment:
            # 컨테이너 내부 마운트 경로 사용 (호스트 경로 아님)
            - GOOGLE_SERVICE_ACCOUNT_KEY_PATH=/app/config/top-service-account.json
            # /app/config/application.properties 를 Spring이 읽도록 지정
            - SPRING_CONFIG_ADDITIONAL_LOCATION=/app/config/
        # New Relic APM 라이선스 키 등 비밀값 (gitignore된 .env, 서버에만 존재)
        # New Relic Java 에이전트가 NEW_RELIC_LICENSE_KEY 환경변수를 자동 인식
        env_file:
            - .env

    web:
        build:
            context: ./frontend
        ports:
            # 3000: 시스템 nginx가 80/443 사용하므로, web은 3000으로 노출
            - '3000:80'
        restart: always
